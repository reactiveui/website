site_name: ReactiveUI
site_url: https://www.reactiveui.net/
site_description: An advanced, composable, functional reactive model-view-viewmodel framework for all .NET platforms.
site_author: ReactiveUI Association and Contributors
copyright: Copyright &copy; ReactiveUI Association and Contributors

repo_url: https://github.com/reactiveui/ReactiveUI
repo_name: reactiveui/ReactiveUI
edit_uri: https://github.com/reactiveui/website/edit/main/docs/

docs_dir: docs
site_dir: site

# Skip the historical release-note articles for now; they pull in
# `pymdownx.magiclink` for `#123` / `@user` shortrefs and don't appear
# in nav anyway. Bring them back as a second pass once we've decided
# how to host them (e.g. a separate published archive).
exclude_docs: |
  /articles/

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: images/logo.png
  favicon: images/favicons/favicon.ico
  font:
    text: Source Sans 3
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    # `navigation.prune` is the big lever for large sites: instead of
    # embedding the full nav into every page, only the active branch
    # is emitted -- ~33% smaller per page, and far less peak memory in
    # zensical's renderer. Required to keep the build under the OOM
    # limit at 13k+ API pages.
    - navigation.prune
    # `navigation.instant.*` was previously enabled for SPA-style
    # routing, but on a 13k-page site each page ends up bundling enough
    # nav state in JS to push the build into OOM (SIGKILL / exit 137).
    # Plain hyperlinks render fine; revisit per-section if a smaller
    # corner of the site can opt in.
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.action.edit
    - content.action.view
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/reactiveui/ReactiveUI
    - icon: fontawesome/brands/slack
      link: https://reactivex.slack.com/
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/ReactiveXUI
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/c/ReactiveUI

plugins:
  - search
  # The `autorefs` plugin builds an in-memory index of every heading
  # across every page so cross-references resolve by symbol name. With
  # 13k+ API pages each carrying dozens of headings, that index pushes
  # the build into OOM on commodity runners. Anchored intra-page links
  # still work; cross-page jumps must be written as explicit relative
  # URLs while autorefs is off.

markdown_extensions:
  # Lean baseline. Each entry runs once per page, and the API tree has
  # 13k+ pages, so per-extension cost compounds. Removed:
  #
  # * pymdownx.magiclink   -- only used by `docs/articles/**`, which we
  #                         now exclude from the build entirely.
  # * pymdownx.smartsymbols -- (tm)/(c)/--> substitutions; only one real
  #                         use (in articles, now excluded).
  # * pymdownx.snippets    -- no `--8<--` directives anywhere in docs.
  # * pymdownx.keys        -- no `++ctrl+c++` shortcuts anywhere.
  #
  # Re-enable per-page via front-matter `markdown_extensions:` if a
  # specific page actually needs one of them.
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - zensical.extensions.glightbox

watch:
  - overrides
  - mkdocs.base.yml
