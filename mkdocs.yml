site_name: ReactiveUI
site_url: https://www.reactiveui.net/
site_description: An advanced, composable, functional reactive model-view-viewmodel framework for all .NET platforms.
site_author: ReactiveUI Association and Contributors
copyright: Copyright &copy; ReactiveUI Association and Contributors

repo_url: https://github.com/reactiveui/ReactiveUI
repo_name: reactiveui/ReactiveUI
edit_uri: https://github.com/reactiveui/website/edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  favicon: images/favicons/favicon.ico
  font:
    text: Source Sans 3
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/reactiveui/ReactiveUI
    - icon: fontawesome/brands/slack
      link: https://reactivex.slack.com/
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/ReactiveXUI
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/c/ReactiveUI

plugins:
  # Zensical-supported set today: search + autorefs (verified against the
  # checkbox state on https://zensical.org/compatibility/plugins/).
  # tags, blog (×2), social, awesome-pages aren't supported yet — Zensical
  # plans to subsume their functionality natively (ZAP 004/005, backlog
  # #30/#37/#38). Auto nav-discovery from docs_dir replaces awesome-pages
  # for the no-config case; per-section ordering moves into nav: blocks
  # below as needed.
  - search
  - autorefs

markdown_extensions:
  # Mirrors the default extension set Zensical activates for new projects
  # (per https://zensical.org/docs/setup/extensions/) so this config works
  # cleanly under either Zensical or stock mkdocs Material. All callable
  # references use the dotted-string form rather than !!python/name: tags
  # — modern pymdownx accepts both, Zensical only accepts strings.
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  # Zensical-native — adds zoom/lightbox to all images automatically.
  # The equivalent of [project.markdown_extensions.zensical.extensions.glightbox]
  # in zensical.toml. Plain mkdocs ignores the unknown extension name; if
  # we ever need a stock-mkdocs build with the same UX, swap in the
  # mkdocs-glightbox PyPI plugin under plugins: instead.
  - zensical.extensions.glightbox

watch:
  - overrides
  - mkdocs.yml
