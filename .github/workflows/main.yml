name: Build website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: website-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Cache fetched packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.nuget/packages
            reactiveui/api/cache
          key: ${{ runner.os }}-website-api-${{ hashFiles('nuget-packages.json', 'build/_build.csproj') }}

      - name: Build website
        run: ./build.sh BuildWebsite

      - name: 'Deploy netlify'
        if: ${{ github.event_name != 'pull_request' }}
        run: |
            npm install -g netlify-cli
            netlify deploy --auth=${{ secrets.NETLIFY_DEPLOY_KEY }} --site=${{ secrets.NETLIFY_SITE_ID }} --prod --dir=reactiveui/_site
