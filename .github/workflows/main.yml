name: Build website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimal token scope. The build only reads source; the netlify deploy
# step authenticates against Netlify via NETLIFY_AUTH_TOKEN, not the
# GITHUB_TOKEN, so no `contents: write` / `actions: write` etc are
# required here.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        if: github.event_name != 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache fetched packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.nuget/packages
            .api-cache
          # The .api-cache key buckets fetched NuGet assemblies + their
          # extracted lib/refs trees; bust whenever the package list or
          # SourceDocParser version moves.
          key: ${{ runner.os }}-website-${{ hashFiles('nuget-packages.json', 'build/_build.csproj', 'Directory.Packages.props') }}

      - name: Build website
        run: ./build.sh build

      # Runs even when the previous step is cancelled or fails so we
      # capture kernel-level evidence of an OOM kill -- a "cancelled"
      # status with no exit code in GH Actions usually means the
      # runner agent saw its own process group disappear after the
      # OOM killer fired. dmesg will show the "Out of memory: Killed
      # process ..." line with the offending RSS, telling us whether
      # to keep trimming or jump to a bigger runner.
      - name: Post-mortem
        if: always()
        run: |
          echo '=== last 200 lines of dmesg ==='
          sudo dmesg | tail -200 || true
          echo
          echo '=== OOM events from journal ==='
          sudo journalctl -k --since "30 minutes ago" \
            | grep -iE 'killed process|out of memory|oom-killer' || true
          echo
          echo '=== mem at end of run ==='
          free -m

      - name: 'Deploy netlify'
        if: ${{ github.event_name != 'pull_request' }}
        # Pipe secrets through env vars rather than expanding into the
        # shell command line so they don't surface in process listings
        # or in CI logs. site/ is the directory the .NET pipeline writes
        # to (set via WithOutput in build/Build.cs).
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_DEPLOY_KEY }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=site
