name: Build website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Build verification only. No secrets are referenced here, so PRs from
# forks cannot exfiltrate deploy credentials via this workflow. Deploys
# live in deploy.yml, which is gated to trusted triggers (push to main,
# schedule, workflow_dispatch).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache fetched packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.nuget/packages
            .api-cache
            build/_intermediate
          # ~/.nuget/packages: NuGet hydration cache.
          # .api-cache: fetched NuGet assemblies + their extracted lib/refs
          # trees (read by the API-doc fetcher).
          # build/_intermediate: regenerated API markdown / yml / metadata
          # configs — derived from .api-cache so they share an invalidation key.
          # Bust on any package-list or NuStreamDocs version move.
          key: ${{ runner.os }}-website-${{ hashFiles('nuget-packages.json', 'build/_build.csproj', 'Directory.Packages.props') }}

      - name: Build website
        run: ./build.sh build
