name: Build website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: website-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        if: github.event_name != 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache fetched packages and Python venv
        uses: actions/cache@v5
        with:
          path: |
            ~/.nuget/packages
            .api-cache
            .venv
          # The .api-cache key buckets fetched NuGet assemblies + their
          # extracted lib/refs trees; bust whenever the package list or
          # SourceDocParser version moves. The .venv bucket buys back
          # the ~30s pip install of zensical / autorefs each run.
          key: ${{ runner.os }}-website-${{ hashFiles('nuget-packages.json', 'build/_build.csproj', 'Directory.Packages.props', 'requirements.txt') }}

      - name: Build website
        run: ./build.sh BuildWebsite --strict

      - name: 'Deploy netlify'
        if: ${{ github.event_name != 'pull_request' }}
        # Pipe secrets through env vars rather than expanding into the
        # shell command line so they don't surface in process listings
        # or in CI logs. site/ is the directory zensical writes to (set
        # via site_dir: in mkdocs.base.yml).
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_DEPLOY_KEY }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=site
